<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#b9472a">
  <title>Recipe Box</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">
    <h1 class="brand" onclick="location.hash='#/home'">🍲 Recipe Box</h1>
    <div class="topbar-right">
      <span id="sync-badge" class="sync-badge" title="GitHub sync status"></span>
      <a class="gear" href="#/settings" aria-label="Setup" title="Setup">⚙️</a>
    </div>
  </header>

  <main id="view" class="view"></main>

  <nav class="bottomnav">
    <a href="#/home" data-nav="home"><span class="nav-ico">🏠</span>Home</a>
    <a href="#/recipes" data-nav="recipes"><span class="nav-ico">📖</span>Recipes</a>
    <a href="#/plan" data-nav="plan"><span class="nav-ico">📅</span>Plan</a>
    <a href="#/shopping" data-nav="shopping"><span class="nav-ico">🛒</span>Shop</a>
    <a href="#/new" data-nav="new"><span class="nav-ico">➕</span>Add</a>
  </nav>

  <div id="modal-root"></div>
  <div id="toast" class="toast" hidden></div>

  <script src="js/store.js"></script>
  <script src="js/shopping.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
